# remap prefix to ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# sane splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# vim-style pane nav
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# mouse
set -g mouse on

# colors — hackerman theme
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g status-style "bg=#0B0C16,fg=#50f872"
set -g status-left "#[bold,fg=#7cf8f7] #S "
set -g status-right "#[fg=#6a6e95]%H:%M "
set -g status-justify centre
set -g window-status-current-style "fg=#82FB9C,bold"
set -g window-status-style "fg=#6a6e95"
set -g pane-border-style "fg=#6a6e95"
set -g pane-active-border-style "fg=#50f872"
set -g message-style "bg=#0B0C16,fg=#7cf8f7"

# start windows/panes at 1
set -g base-index 1
setw -g pane-base-index 1

# fast escape (for nvim)
set -sg escape-time 0
